name: build with maven

on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven
      - name: build application
        run: >
         mvn clean install
         -DDB_URL=${{secrets.DB_URL}}
         -DDB_PASSWORD=${{secret.DB_PASSWORD}}
         -DDB_USERNAME=${{secrets.DB_USERNAME}}
         -DSHARED_KEY=${{secrets.SHARED_KEY}}
      - name: build image
        run: docker build -t payment-service .
      - name: tag image
        run: docker tag payment-service bigman004/payment-service:latest
      - name: login
        run: docker login -u bigman004 -p ${{secrets.DOCKER_SECRET}}
      - name: push image
        run: docker push bigman004/payment-service:latest

